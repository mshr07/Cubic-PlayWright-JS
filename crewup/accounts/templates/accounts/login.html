{% extends "base.html" %}

{% block title %}Login | CrewUp{% endblock %}

{% block content %}
<section class="section">
    <div class="container narrow">
        <div class="panel">
            <h1>Login</h1>
            <form method="post">
                {% csrf_token %}
                {{ form.non_field_errors }}
                {% for field in form %}
                    <div class="form-group">
                        <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                        {{ field }}
                        {{ field.errors }}
                    </div>
                {% endfor %}
                <button class="button" type="submit">Continue</button>
            </form>
        </div>
    </div>
</section>
{% endblock %}
